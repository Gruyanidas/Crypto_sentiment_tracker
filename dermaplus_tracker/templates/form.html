{% extends "base.html" %}
{% block content %}

{% set current_service = prefill.get('service_type', '') %}
{% set is_custom = current_service and current_service not in services %}

<div class="form-page">
    <a href="javascript:history.back()" class="back-link">&#8592; Назад</a>
    <h1 class="form-title">{{ action }} термин</h1>

    <form method="POST"
          {% if reschedule_id %}action="{{ url_for('reschedule', res_id=reschedule_id) }}"{% endif %}
          class="res-form">

        <div class="form-row">
            <div class="form-group">
                <label for="client_name">Ime на клиент <span class="req">*</span></label>
                <input type="text" id="client_name" name="client_name"
                       value="{{ prefill.get('client_name', '') }}"
                       placeholder="пр. Ана Јовиќ" required autofocus>
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ prefill.get('phone', '') }}"
                       placeholder="пр. 070 123 456">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date">Датум <span class="req">*</span></label>
                <input type="date" id="date" name="date"
                       value="{{ prefill.get('date', '') }}" required>
            </div>
            <div class="form-group">
                <label for="time">Време <span class="req">*</span></label>
                <input type="time" id="time" name="time"
                       value="{{ prefill.get('time', '') }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="service_select">Услуга <span class="req">*</span></label>
            <select id="service_select" name="service_select">
                <option value="" disabled {{ 'selected' if not current_service }}>— Изберете услуга —</option>
                {% for s in services %}
                    <option value="{{ s }}" {{ 'selected' if current_service == s }}>{{ s }}</option>
                {% endfor %}
                <option value="other" {{ 'selected' if is_custom }}>Друго (внеси рачно)</option>
            </select>
        </div>

        <div class="form-group" id="custom-wrap" style="display: {{ 'block' if is_custom else 'none' }};">
            <label for="service_custom">Назив на услугата <span class="req">*</span></label>
            <input type="text" id="service_custom" name="service_custom"
                   value="{{ current_service if is_custom else '' }}"
                   placeholder="Внеси назив на услугата">
        </div>

        <div class="form-group">
            <label for="notes">Забелешка</label>
            <textarea id="notes" name="notes" rows="3"
                      placeholder="Дополнителни информации...">{{ prefill.get('notes', '') }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-gold btn-full">{{ action }} термин</button>
        </div>

    </form>
</div>

<script>
    const sel = document.getElementById('service_select');
    const wrap = document.getElementById('custom-wrap');
    const inp  = document.getElementById('service_custom');

    function toggle() {
        const show = sel.value === 'other';
        wrap.style.display = show ? 'block' : 'none';
        inp.required = show;
    }

    sel.addEventListener('change', toggle);
    toggle();

    {% if pick_date %}
    // "Следен третман": client data already filled, jump straight to date picking
    const dateField = document.getElementById('date');
    if (dateField) {
        dateField.focus();
        if (typeof dateField.showPicker === 'function') {
            try { dateField.showPicker(); } catch (e) { /* needs a tap on some browsers */ }
        }
    }
    {% endif %}
</script>

{% endblock %}

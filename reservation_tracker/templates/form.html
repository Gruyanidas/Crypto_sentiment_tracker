{% extends "base.html" %}
{% block content %}

<section class="form-section">
    <h2>{{ action }} Reservation</h2>

    <form method="POST" class="res-form">
        <div class="form-group">
            <label for="client_name">Client Name <span class="req">*</span></label>
            <input type="text" id="client_name" name="client_name"
                   value="{{ reservation.get('client_name', '') if reservation is mapping else reservation['client_name'] }}"
                   placeholder="e.g. John Smith" required autofocus>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date">Date <span class="req">*</span></label>
                <input type="date" id="date" name="date"
                       value="{{ reservation.get('date', '') if reservation is mapping else reservation['date'] }}"
                       required>
            </div>
            <div class="form-group">
                <label for="time">Time <span class="req">*</span></label>
                <input type="time" id="time" name="time"
                       value="{{ reservation.get('time', '') if reservation is mapping else reservation['time'] }}"
                       required>
            </div>
        </div>

        <div class="form-group">
            <label for="service_type">Service Type <span class="req">*</span></label>
            <input type="text" id="service_type" name="service_type"
                   value="{{ reservation.get('service_type', '') if reservation is mapping else reservation['service_type'] }}"
                   placeholder="e.g. Haircut, Massage, Consultation" required>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"
                      placeholder="Any additional notes...">{{ reservation.get('notes', '') if reservation is mapping else reservation['notes'] }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ action }} Reservation</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>

{% endblock %}
